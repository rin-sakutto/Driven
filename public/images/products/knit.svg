    <line x1="178" y1="340" x2="422" y2="340" stroke="#1d1d1d" stroke-width="0.5"/>
    <line x1="178" y1="370" x2="422" y2="370" stroke="#1d1d1d" stroke-width="0.5"/>
    <line x1="178" y1="400" x2="422" y2="400" stroke="#1d1d1d" stroke-width="0.5"/>
    <line x1="178" y1="430" x2="422" y2="430" stroke="#1d1d1d" stroke-width="0.5"/>
    <line x1="178" y1="460" x2="422" y2="460" stroke="#1d1d1d" stroke-width="0.5"/>
    <line x1="178" y1="490" x2="422" y2="490" stroke="#1d1d1d" stroke-width="0.5"/>
    <line x1="178" y1="520" x2="422" y2="520" stroke="#1d1d1d" stroke-width="0.5"/>
    <line x1="178" y1="550" x2="422" y2="550" stroke="#1d1d1d" stroke-width="0.5"/>
    <line x1="178" y1="580" x2="422" y2="580" stroke="#1d1d1d" stroke-width="0.5"/>
    <line x1="178" y1="610" x2="422" y2="610" stroke="#1d1d1d" stroke-width="0.5"/>
    <line x1="178" y1="640" x2="422" y2="640" stroke="#1d1d1d" stroke-width="0.5"/>

