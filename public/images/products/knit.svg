    <line x1="510" y1="310" x2="525" y2="415" stroke="#1f1f1f" stroke-width="0.5"/>
    <line x1="495" y1="295" x2="512" y2="448" stroke="#1f1f1f" stroke-width="0.5"/>
    <line x1="480" y1="285" x2="495" y2="468" stroke="#1f1f1f" stroke-width="0.5"/>
    <line x1="462" y1="278" x2="478" y2="478" stroke="#1f1f1f" stroke-width="0.5"/>
    <line x1="445" y1="274" x2="460" y2="482" stroke="#1f1f1f" stroke-width="0.5"/>

