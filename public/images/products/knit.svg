<svg viewBox="0 0 600 780" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#131313"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="bodyL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#262626"/>
      <stop offset="60%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#181818"/>
    </linearGradient>
    <linearGradient id="bodyR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#242424"/>
      <stop offset="100%" stop-color="#181818"/>
    </linearGradient>
    <linearGradient id="sleeveL" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#232323"/>
      <stop offset="100%" stop-color="#161616"/>
    </linearGradient>
    <linearGradient id="sleeveR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#222222"/>
      <stop offset="100%" stop-color="#161616"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#232323" stop-opacity="1"/>
      <stop offset="100%" stop-color="#111111" stop-opacity="1"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.65"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="780" fill="url(#bg)"/>
  <rect width="600" height="780" fill="url(#glow)" opacity="0.5"/>

  <!-- Ground shadow -->
  <ellipse cx="300" cy="708" rx="170" ry="13" fill="#000" opacity="0.5"/>

