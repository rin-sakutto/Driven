    <line x1="192" y1="285" x2="188" y2="662" stroke="#1e1e1e" stroke-width="0.6"/>
    <line x1="210" y1="282" x2="206" y2="662" stroke="#1e1e1e" stroke-width="0.6"/>
    <line x1="228" y1="280" x2="224" y2="662" stroke="#1e1e1e" stroke-width="0.6"/>
    <line x1="246" y1="278" x2="242" y2="662" stroke="#1e1e1e" stroke-width="0.6"/>
    <line x1="264" y1="277" x2="260" y2="662" stroke="#1e1e1e" stroke-width="0.6"/>
    <line x1="282" y1="276" x2="278" y2="662" stroke="#1e1e1e" stroke-width="0.6"/>
    <line x1="318" y1="276" x2="322" y2="662" stroke="#1e1e1e" stroke-width="0.6"/>
    <line x1="336" y1="277" x2="340" y2="662" stroke="#1e1e1e" stroke-width="0.6"/>
    <line x1="354" y1="278" x2="358" y2="662" stroke="#1e1e1e" stroke-width="0.6"/>
    <line x1="372" y1="280" x2="376" y2="662" stroke="#1e1e1e" stroke-width="0.6"/>
    <line x1="390" y1="282" x2="394" y2="662" stroke="#1e1e1e" stroke-width="0.6"/>
    <line x1="408" y1="285" x2="412" y2="662" stroke="#1e1e1e" stroke-width="0.6"/>

