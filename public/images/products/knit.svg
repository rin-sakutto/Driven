  <g filter="url(#shadow)">

    <!-- Left sleeve -->
    <path d="M 170 242 L 90 308 L 65 470 L 67 498 L 115 502 L 138 345 L 178 280" fill="url(#sleeveL)" stroke="#2a2a2a" stroke-width="0.6"/>
    <!-- Left cuff ribs -->
    <rect x="62" y="493" width="56" height="24" rx="4" fill="#1d1d1d" stroke="#292929" stroke-width="0.5"/>
    <line x1="65" y1="498" x2="116" y2="498" stroke="#222" stroke-width="0.6"/>
    <line x1="65" y1="503" x2="116" y2="503" stroke="#222" stroke-width="0.6"/>
    <line x1="65" y1="508" x2="116" y2="508" stroke="#222" stroke-width="0.6"/>
    <line x1="65" y1="513" x2="116" y2="513" stroke="#222" stroke-width="0.6"/>
    <!-- Left sleeve knit lines -->
    <line x1="90" y1="310" x2="75" y2="415" stroke="#1f1f1f" stroke-width="0.5"/>
    <line x1="105" y1="295" x2="88" y2="448" stroke="#1f1f1f" stroke-width="0.5"/>
    <line x1="120" y1="285" x2="105" y2="468" stroke="#1f1f1f" stroke-width="0.5"/>
    <line x1="138" y1="278" x2="122" y2="478" stroke="#1f1f1f" stroke-width="0.5"/>
    <line x1="155" y1="274" x2="140" y2="482" stroke="#1f1f1f" stroke-width="0.5"/>

    <!-- Right sleeve -->
    <path d="M 430 242 L 510 308 L 535 470 L 533 498 L 485 502 L 462 345 L 422 280" fill="url(#sleeveR)" stroke="#2a2a2a" stroke-width="0.6"/>
    <!-- Right cuff ribs -->
    <rect x="482" y="493" width="56" height="24" rx="4" fill="#1d1d1d" stroke="#292929" stroke-width="0.5"/>
    <line x1="484" y1="498" x2="535" y2="498" stroke="#222" stroke-width="0.6"/>
    <line x1="484" y1="503" x2="535" y2="503" stroke="#222" stroke-width="0.6"/>
    <line x1="484" y1="508" x2="535" y2="508" stroke="#222" stroke-width="0.6"/>
    <line x1="484" y1="513" x2="535" y2="513" stroke="#222" stroke-width="0.6"/>
