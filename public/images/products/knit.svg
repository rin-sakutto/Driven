    <line x1="180" y1="660" x2="420" y2="660" stroke="#222" stroke-width="0.7"/>
    <line x1="180" y1="666" x2="420" y2="666" stroke="#222" stroke-width="0.7"/>
    <line x1="180" y1="672" x2="420" y2="672" stroke="#222" stroke-width="0.7"/>

    <!-- Crew neck ribbing -->
    <path d="M 170 242 Q 230 235 300 232 Q 370 235 430 242 Q 400 230 370 226 Q 340 218 300 216 Q 260 218 230 226 Q 200 230 170 242 Z" fill="#1e1e1e" stroke="#282828" stroke-width="0.6"/>
    <!-- Neck rib lines -->
    <path d="M 230 226 Q 265 220 300 218 Q 335 220 370 226" fill="none" stroke="#222" stroke-width="0.7"/>
    <path d="M 215 231 Q 257 224 300 222 Q 343 224 385 231" fill="none" stroke="#222" stroke-width="0.6"/>
    <path d="M 192 238 Q 245 230 300 228 Q 355 230 408 238" fill="none" stroke="#222" stroke-width="0.6"/>

    <!-- Shoulder seam -->
    <path d="M 170 242 Q 235 248 300 250 Q 365 248 430 242" fill="none" stroke="#242424" stroke-width="0.8"/>

    <!-- Chest cable knit panel (subtle diamond pattern) -->
    <path d="M 268 295 L 300 318 L 332 295 L 300 272 Z" fill="none" stroke="#1f1f1f" stroke-width="0.8"/>
    <path d="M 268 355 L 300 378 L 332 355 L 300 332 Z" fill="none" stroke="#1f1f1f" stroke-width="0.8"/>
    <path d="M 268 415 L 300 438 L 332 415 L 300 392 Z" fill="none" stroke="#1f1f1f" stroke-width="0.8"/>

    <!-- DRIVEN text -->
    <text x="300" y="490" font-family="Arial, sans-serif" font-size="7.5" fill="#1e1e1e" text-anchor="middle" letter-spacing="5" font-weight="bold">DRIVEN</text>

  </g>
