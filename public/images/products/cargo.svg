<svg viewBox="0 0 600 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#131313"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </linearGradient>
    <linearGradient id="legL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#252525"/>
      <stop offset="100%" stop-color="#181818"/>
    </linearGradient>
    <linearGradient id="legR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#222222"/>
      <stop offset="100%" stop-color="#181818"/>
    </linearGradient>
    <linearGradient id="waist" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1c1c1c"/>
    </linearGradient>
    <linearGradient id="pocket" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#202020"/>
      <stop offset="100%" stop-color="#161616"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#232323" stop-opacity="1"/>
      <stop offset="100%" stop-color="#111111" stop-opacity="1"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000" flood-opacity="0.65"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="820" fill="url(#bg)"/>
  <rect width="600" height="820" fill="url(#glow)" opacity="0.5"/>

  <!-- Ground shadow -->
  <ellipse cx="300" cy="760" rx="165" ry="12" fill="#000" opacity="0.5"/>

  <!-- ===== CARGO PANTS ===== -->
  <g filter="url(#shadow)">

    <!-- Waistband -->
    <rect x="158" y="95" width="284" height="32" rx="5" fill="url(#waist)" stroke="#2e2e2e" stroke-width="0.7"/>
    <!-- Belt loops -->
    <rect x="172" y="90" width="10" height="28" rx="2" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="0.5"/>
    <rect x="218" y="90" width="10" height="28" rx="2" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="0.5"/>
    <rect x="294" y="90" width="10" height="28" rx="2" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="0.5"/>
    <rect x="370" y="90" width="10" height="28" rx="2" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="0.5"/>
    <rect x="418" y="90" width="10" height="28" rx="2" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="0.5"/>
    <!-- Fly -->
    <line x1="300" y1="127" x2="300" y2="185" stroke="#222" stroke-width="1.2" stroke-dasharray="4 2"/>
    <!-- Fly button -->
    <circle cx="300" cy="130" r="4" fill="#1c1c1c" stroke="#282828" stroke-width="0.6"/>

    <!-- Main body (crotch area) -->
    <path d="M 158 127 L 158 345 Q 240 360 300 358 Q 360 360 442 345 L 442 127 Z" fill="url(#legL)" stroke="#2c2c2c" stroke-width="0.5"/>

    <!-- Left leg -->
    <path d="M 158 320 Q 158 340 152 370 L 130 740 L 162 744 L 192 748 L 212 400 L 295 390 L 295 750 L 232 754 Q 270 754 300 755" fill="url(#legL)" stroke="#292929" stroke-width="0.6"/>
    <!-- Right leg -->
    <path d="M 442 320 Q 442 340 448 370 L 470 740 L 438 744 L 408 748 L 388 400 L 305 390 L 305 750 L 368 754 Q 330 754 300 755" fill="url(#legR)" stroke="#282828" stroke-width="0.6"/>

    <!-- Left leg bottom (cuff) -->
    <path d="M 130 736 L 210 742 Q 220 750 210 755 L 130 749 Q 120 745 130 736 Z" fill="#1c1c1c" stroke="#272727" stroke-width="0.6"/>
    <!-- Right leg bottom (cuff) -->
    <path d="M 470 736 L 390 742 Q 380 750 390 755 L 470 749 Q 480 745 470 736 Z" fill="#1c1c1c" stroke="#272727" stroke-width="0.6"/>

    <!-- Inseam crease left -->
    <path d="M 265 355 L 215 740" stroke="#222" stroke-width="0.7" stroke-dasharray="5 4"/>
    <!-- Inseam crease right -->
    <path d="M 335 355 L 385 740" stroke="#222" stroke-width="0.7" stroke-dasharray="5 4"/>
    <!-- Front crease left -->
    <path d="M 230 130 L 190 740" stroke="#1e1e1e" stroke-width="0.5" stroke-dasharray="6 5"/>
    <!-- Front crease right -->
    <path d="M 370 130 L 410 740" stroke="#1e1e1e" stroke-width="0.5" stroke-dasharray="6 5"/>

    <!-- LEFT CARGO POCKET (outer thigh) -->
    <path d="M 118 350 Q 112 342 118 335 L 198 335 Q 206 342 200 350 L 200 480 Q 200 490 192 492 L 126 492 Q 118 490 118 480 Z" fill="url(#pocket)" stroke="#262626" stroke-width="0.8"/>
    <!-- Left pocket flap -->
    <path d="M 116 350 L 202 350" stroke="#272727" stroke-width="1"/>
    <rect x="118" y="340" width="82" height="18" rx="3" fill="#1c1c1c" stroke="#262626" stroke-width="0.6"/>
    <!-- Left pocket button -->
    <circle cx="159" cy="349" r="4.5" fill="#1a1a1a" stroke="#272727" stroke-width="0.6"/>
    <!-- Left pocket side detail -->
    <line x1="130" y1="380" x2="188" y2="380" stroke="#222" stroke-width="0.5"/>
    <line x1="130" y1="420" x2="188" y2="420" stroke="#222" stroke-width="0.5"/>
    <line x1="130" y1="460" x2="188" y2="460" stroke="#222" stroke-width="0.5"/>

    <!-- RIGHT CARGO POCKET (outer thigh) -->
    <path d="M 482 350 Q 488 342 482 335 L 402 335 Q 394 342 400 350 L 400 480 Q 400 490 408 492 L 474 492 Q 482 490 482 480 Z" fill="url(#pocket)" stroke="#262626" stroke-width="0.8"/>
    <!-- Right pocket flap -->
    <path d="M 484 350 L 398 350" stroke="#272727" stroke-width="1"/>
    <rect x="400" y="340" width="82" height="18" rx="3" fill="#1c1c1c" stroke="#262626" stroke-width="0.6"/>
    <!-- Right pocket button -->
    <circle cx="441" cy="349" r="4.5" fill="#1a1a1a" stroke="#272727" stroke-width="0.6"/>
    <!-- Right pocket side detail -->
    <line x1="412" y1="380" x2="470" y2="380" stroke="#222" stroke-width="0.5"/>
    <line x1="412" y1="420" x2="470" y2="420" stroke="#222" stroke-width="0.5"/>
    <line x1="412" y1="460" x2="470" y2="460" stroke="#222" stroke-width="0.5"/>

    <!-- Small front coin pockets -->
    <path d="M 182 135 Q 182 128 190 127 L 235 127 Q 243 128 238 135 Z" fill="#1e1e1e" stroke="#262626" stroke-width="0.6"/>
    <path d="M 418 135 Q 418 128 410 127 L 365 127 Q 357 128 362 135 Z" fill="#1e1e1e" stroke="#262626" stroke-width="0.6"/>

    <!-- Brand on left thigh -->
    <text x="160" y="560" font-family="Arial, sans-serif" font-size="7" fill="#1d1d1d" text-anchor="middle" letter-spacing="4" font-weight="bold" transform="rotate(-2 160 560)">DRIVEN</text>

  </g>
</svg>
